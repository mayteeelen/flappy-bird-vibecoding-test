<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <button id="soundToggle" class="sound-toggle">🔊</button>

    <!-- Audio elements -->
    <audio id="flapSound" preload="auto">
        <source src="sound_flap.mp3" type="audio/mpeg">
    </audio>
    <audio id="crashSound" preload="auto">
        <source src="sound_crash.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
